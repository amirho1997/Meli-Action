name: دانلود لینک مستقیم فیلتر شده

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل مورد نظر'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل فشرده (اختیاری - در صورت خالی گذاشتن، فایل بدون رمز فشرده می‌شود)'
        required: false
        type: string
      output_folder:
        description: 'پوشه ذخیره فایل و آرشیوها (نسبت به ریشه مخزن)'
        required: false
        type: string
        default: 'downloads'

permissions:
  contents: write

jobs:
  leech-split-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Create output folder
        run: mkdir -p "${{ inputs.output_folder }}"

      - name: Install 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Download file
        run: |
          cd "${{ inputs.output_folder }}"
          curl -L --fail --retry 3 -o original_file "${{ inputs.file_url }}"

      - name: Create encrypted split archive
        run: |
          cd "${{ inputs.output_folder }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          PASSWORD="${{ inputs.zip_password }}"
          if [ -n "$PASSWORD" ]; then
            7z a -p"$PASSWORD" -mhe=on -mx=3 -v85m "archive_${TIMESTAMP}.7z" original_file
          else
            7z a -mx=3 -v85m "archive_${TIMESTAMP}.7z" original_file
          fi
          # If only one chunk, rename it to .7z (no .001)
          if [ -f "archive_${TIMESTAMP}.7z.001" ] && [ ! -f "archive_${TIMESTAMP}.7z.002" ]; then
            mv "archive_${TIMESTAMP}.7z.001" "archive_${TIMESTAMP}.7z"
          fi

      - name: Remove original downloaded file
        run: rm -f "${{ inputs.output_folder }}/original_file"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.output_folder }}"
          git commit -m "Add file from ${{ inputs.file_url }} [skip ci]" || echo "No changes to commit"
          git push
